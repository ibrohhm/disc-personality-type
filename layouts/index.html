{{ define "title" }}{{ .Site.Title }}{{ end }}

{{ define "main" }}
<section class="hero">
  <h1>{{ .Title | default .Site.Title }}</h1>
  {{ with .Params.subtitle }}<h1>{{ . }}</h1>{{ end }}
  {{ with .Description }}<p class="description">{{ . }}</p>{{ end }}
  {{ with .Content }}<div class="content">{{ . }}</div>{{ end }}
  <a href="{{ "question" | relURL }}" class="btn-play">Start Survey →</a>
</section>
{{ end }}
